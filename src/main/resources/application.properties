# Uygulama İsmi
spring.application.name=assistant

# Sunucu Port Ayarı
server.port=${PORT:8080}

# H2 / PostgreSQL Hibrit Veritabanı Yapılandırması (Bulutta PostgreSQL, Yerelde H2)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:budgetdb}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}

# H2 Konsolu Aktifleştirme (Veritabanını tarayıcıdan görebilmek için)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA SQL Loglarını Konsolda Görme
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

# Google Gemini API Ayarları
# API anahtarını bilgisayarındaki GEMINI_API_KEY çevre değişkeninden okur. 
gemini.api.key=${GEMINI_API_KEY:}
